<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Story</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container glassmorphism">
        <div style="margin-bottom: 20px;">
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
        
        <h1>📖 What happened to you?</h1>
        
        <!-- تحذير الكلمات غير اللائقة -->
        <div class="warning-box" style="background: rgba(255,100,100,0.2); border-left: 4px solid #ff4444; padding: 12px; border-radius: 12px; margin-bottom: 20px;">
            ⚠️ <strong>Content Guidelines:</strong> Please avoid using inappropriate language, hate speech, or offensive content. Stories containing such words will be rejected.
        </div>
        
        <form method="POST" action="/add">
            <input type="text" name="title" placeholder="Give your story a title (max 200 characters)" required maxlength="200">
            
            <select name="category" required>
                <option value="Funny">😂 Funny</option>
                <option value="Scary">👻 Scary</option>
                <option value="Weird">🌀 Weird</option>
            </select>
            
            <textarea name="content" rows="10" placeholder="Write your strangest experience... (max 5000 characters)" required maxlength="5000"></textarea>
            
            <input type="password" name="password" placeholder="Create a password to delete your story later (min 3 characters)" required minlength="3">
            
            <small style="color: #ffaa44; display: block; margin: 5px 0;">⚠️ Keep this password! You'll need it to delete your story.</small>
            
            <button type="submit" class="btn-submit">🚀 Publish Story</button>
        </form>
    </div>
</body>
</html>
