<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ story[1] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="story-full">
        <a href="/" class="back-btn" style="display: inline-block; margin-bottom: 20px; color: #aaa; text-decoration: none;">← Back to all stories</a>
        <h1>{{ story[1] }}</h1>
        <div class="category-badge {{ story[3] }}">{{ story[3] }}</div>
        <p class="story-content">{{ story[2] }}</p>
        <div class="date">📅 {{ story[4] }}</div>
    </div>

    <div class="comments-section">
        <h3>💬 Comments</h3>
        
        <div class="info-box" style="background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; margin-bottom: 15px; font-size: 0.75rem;">
            Be respectful. Inappropriate comments will be rejected.
        </div>
        
        {% for comment in comments %}
        <div class="comment-card">
            <p>{{ comment[2] }}</p>
            <span class="comment-date">📅 {{ comment[3] }}</span>
        </div>
        {% endfor %}

        <form method="POST" class="comment-form">
            <textarea name="comment" rows="3" placeholder="Leave a comment... (max 1000 characters)" required maxlength="1000"></textarea>
            <button type="submit">Add Comment</button>
        </form>
    </div>
</body>
</html>
