<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ story[1] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="story-full">
        <a href="/" class="back-btn">← Back to all stories</a>
        <h1>{{ story[1] }}</h1>
        <div class="category-badge {{ story[3] }}">{{ story[3] }}</div>
        <p class="story-content">{{ story[2] }}</p>
        <div class="date">📅 {{ story[4] }}</div>
    </div>

    <div class="comments-section">
        <h3>💬 Comments</h3>
        
        <div class="warning-box" style="background: rgba(255,100,100,0.1); border-left: 4px solid #ffaa44; padding: 8px 12px; border-radius: 12px; margin-bottom: 15px; font-size: 0.8rem;">
            ⚠️ Be respectful. Comments with inappropriate language will be rejected.
        </div>
        
        {% for comment in comments %}
        <div class="comment-card">
            <p>{{ comment[2] }}</p>
            <span class="date">📅 {{ comment[3] }}</span>
        </div>
        {% endfor %}
        
        <form method="POST">
            <textarea name="comment" rows="3" placeholder="Leave a comment... (max 1000 characters)" required maxlength="1000"></textarea>
            <button type="submit">Add Comment</button>
        </form>
    </div>
</body>
</html>
